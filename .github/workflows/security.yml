name: security

# Supply-chain gate: RUSTSEC advisories (cargo-audit) + licenses/bans/sources (cargo-deny).
# Runs on every push/PR to main and weekly — a scheduled run catches advisories published
# AFTER a PR merged, which a push-only trigger would miss against a static Cargo.lock.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit (RUSTSEC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo deny (licenses + bans + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
