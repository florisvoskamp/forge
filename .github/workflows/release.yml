name: release

# Build release binaries for Linux, macOS (Apple Silicon + Intel), and Windows whenever a
# `v*` tag is pushed, and attach them to a GitHub Release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --bin forge --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          dir="forge-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/forge" "$dir/"
          cp README.md LICENSE "$dir/" 2>/dev/null || true
          tar czf "$dir.tar.gz" "$dir"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $dir = "forge-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/forge.exe" "$dir/"
          Copy-Item README.md, LICENSE "$dir/" -ErrorAction SilentlyContinue
          Compress-Archive -Path $dir -DestinationPath "$dir.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-${{ matrix.target }}
          path: |
            forge-${{ matrix.target }}.tar.gz
            forge-${{ matrix.target }}.zip
          if-no-files-found: ignore

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        shell: bash
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt 2>/dev/null || sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: false

      # Keep the Homebrew formula's version + sha256 in step with the release, using THIS release's
      # just-built checksums (no "sha race" against assets that don't exist yet). Opens a PR rather
      # than pushing to main directly, because main is branch-protected (a direct push is rejected,
      # which a continue-on-error step would silently swallow). Best-effort: a hiccup must never fail
      # the release — the same script (scripts/update-brew-formula.sh <version>) is the hand fallback.
      - name: Update Homebrew formula
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git clone --depth 1 --branch main \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" brew-repo
          cd brew-repo
          bash scripts/update-brew-formula.sh "$VERSION" "$GITHUB_WORKSPACE/dist/checksums.txt"
          if git diff --quiet homebrew/forge.rb; then
            echo "formula already current"; exit 0
          fi
          BRANCH="brew/v$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add homebrew/forge.rb
          git commit -m "chore(brew): update formula to v$VERSION"
          git push -f origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore(brew): update formula to v$VERSION" \
            --body "Auto-generated by release.yml after publishing v$VERSION (sha256 from the release's checksums.txt)." \
            || echo "PR already exists"
          gh pr merge "$BRANCH" --squash --auto || echo "auto-merge not enabled; merge manually"
