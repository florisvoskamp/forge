name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Skip the Rust matrix gracefully until the cargo project exists (design phase).
  guard:
    runs-on: ubuntu-latest
    outputs:
      has_cargo: ${{ steps.check.outputs.has_cargo }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f Cargo.toml ]; then
            echo "has_cargo=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cargo=false" >> "$GITHUB_OUTPUT"
            echo "No Cargo.toml yet — design phase, skipping Rust checks."
          fi

  fmt:
    needs: guard
    if: needs.guard.outputs.has_cargo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    needs: guard
    if: needs.guard.outputs.has_cargo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # `--locked` fails if Cargo.lock is out of sync with Cargo.toml. Without it, a version bump
      # that forgets to refresh the lock (e.g. `cargo update -p forge` — a no-op, the root crate is
      # forge-cli) sails through every PR and only blows up at release time, where the build DOES use
      # `--locked` (cost us a failed v0.4.42 release). Catch the drift here, on every PR.
      - run: cargo clippy --locked --all-targets --all-features

  test:
    needs: guard
    if: needs.guard.outputs.has_cargo == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all --all-features
      # No release build in CI: tests already compile the whole workspace (debug), and the
      # `lto = "thin"` release profile is slow to link ×3 OSes. Release binaries are built on demand
      # (tags / manual), not on every PR.

  CI:
    needs: [guard, fmt, clippy, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed"
