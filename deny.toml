# cargo-deny configuration — license allowlist, banned/duplicate deps, source pinning, and
# RUSTSEC advisory gating. Enforced by .github/workflows/security.yml (`cargo deny check`).
# Run locally with: cargo install cargo-deny && cargo deny check

[graph]
# Evaluate all targets we actually ship for, so platform-specific deps (Landlock on Linux,
# keyring backends, windows-native) are linted too.
all-features = true

[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]
# Fail on any unfixed RUSTSEC advisory or yanked crate. To temporarily accept one, add its
# `RUSTSEC-YYYY-NNNN` id below WITH a comment: why it's tolerable and the tracking issue/date.
yanked = "deny"
# Each ignore is an unmaintained-crate advisory (informational, not a vulnerability) pulled in
# transitively with no safe upgrade available. Revisit when the upstream that pulls it updates.
ignore = [
  # `paste` (proc-macro) is archived/unmaintained. Pulled by genai 0.6.5 (pinned). No CVE; no
  # safe upgrade until genai drops it. Revisit on the next genai bump.
  "RUSTSEC-2024-0436",
  # `yaml-rust` is unmaintained. Pulled by syntect 5.3 (syntax/theme loading). No CVE; no safe
  # upgrade until syntect migrates to yaml-rust2. Revisit on the next syntect bump.
  "RUSTSEC-2024-0320",
  # `bincode` 1.3.3 — upstream permanently ceased development (deemed complete). Pulled by
  # syntect 5.3 (dump load/store). No CVE; no safe upgrade. Revisit on the next syntect bump.
  "RUSTSEC-2025-0141",
  # `async-std` discontinued. DEV-ONLY: pulled by httpmock 0.7 (test mocks in forge-provider),
  # never in the shipped binary. No CVE; no safe upgrade until httpmock drops it.
  "RUSTSEC-2025-0052",
]

[licenses]
version = 2
# Permissive licenses only. Anything outside this set fails the build and must be reviewed before
# the dependency is added.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CC0-1.0",
  "Unlicense",
  # Boost Software License — permissive, no attribution required (e.g. `ryu`, `xattr`).
  "BSL-1.0",
  # Community Data License Agreement (permissive) — covers the bundled Mozilla CA root data in
  # `webpki-root-certs` / `webpki-roots`.
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
# Skip workspace-internal crates that are publish = false / carry no license field (e.g. xtasks).
private = { ignore = true }
# Note: `ring` (rustls stack) passes against this allowlist as-is — no `[[licenses.clarify]]`
# needed. If a future bump changes that, deny prints the expected LICENSE hash for a clarify block.

[bans]
# Duplicate versions bloat the binary and the audit surface; warn rather than fail (the genai /
# ratatui / reqwest trees legitimately pull a few). Promote to "deny" once the tree is clean.
multiple-versions = "warn"
wildcards = "warn"
allow = []
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
